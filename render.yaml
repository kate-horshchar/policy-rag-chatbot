services:
  - type: web
    name: policy-rag-chatbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/build_index.py
    startCommand: gunicorn app.web:app --bind "0.0.0.0:${PORT:-10000}" --timeout 300 --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: EMBEDDING_DEVICE
        value: cpu
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: CHROMA_COLLECTION_NAME
        value: company_policies
      - key: TOP_K
        value: "5"
      - key: MMR_LAMBDA
        value: "0.7"
      - key: RERANK_ENABLED
        value: "false"
      - key: FLASK_SECRET_KEY
        sync: false
      - key: MAX_QUERY_LENGTH
        value: "500"
