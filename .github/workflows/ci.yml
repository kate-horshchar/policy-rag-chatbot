name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check formatting with black
        run: black --check src/ app/ evaluation/ tests/

      - name: Lint with flake8
        run: flake8 src/ app/ evaluation/ tests/ --max-line-length=100

      - name: Import check
        run: python -c "import app.web; import src.pipeline; import src.ingestion"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          CHROMA_PERSIST_DIR: ./chroma_db
          CHROMA_COLLECTION_NAME: company_policies
          TOP_K: "5"
          RERANK_ENABLED: "false"
          FLASK_SECRET_KEY: ci-secret-key
          MAX_QUERY_LENGTH: "500"

      - name: Run tests
        run: pytest tests/ -v
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          CHROMA_PERSIST_DIR: ./chroma_db
          CHROMA_COLLECTION_NAME: company_policies
          TOP_K: "5"
          RERANK_ENABLED: "false"
          FLASK_SECRET_KEY: ci-secret-key
          MAX_QUERY_LENGTH: "500"
