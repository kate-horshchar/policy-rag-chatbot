<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Consulting — Policy Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Policy Assistant</h1>
            <p class="subtitle">Ask questions about Sunshine Consulting policies</p>
        </header>

        <div class="chat-window" id="chat-window">
            <div class="message assistant">
                <div class="message-content">
                    Hi! I'm the Sunshine Consulting Policy Assistant. Ask me anything about company policies — PTO, expenses, remote work, security, and more.
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea
                id="question-input"
                placeholder="Ask a question about company policies..."
                rows="2"
                maxlength="500"
            ></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <div class="char-count"><span id="char-count">0</span> / 500</div>
    </div>

    <script>
        const input = document.getElementById("question-input");
        const charCount = document.getElementById("char-count");

        input.addEventListener("input", () => {
            charCount.textContent = input.value.length;
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            appendMessage("user", question);
            input.value = "";
            charCount.textContent = "0";

            const loadingId = appendLoading();
            document.getElementById("send-btn").disabled = true;

            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question }),
            })
            .then(res => res.json())
            .then(data => {
                removeLoading(loadingId);
                if (data.error) {
                    appendMessage("assistant", data.error);
                } else {
                    appendAnswer(data);
                }
            })
            .catch(() => {
                removeLoading(loadingId);
                appendMessage("assistant", "Something went wrong. Please try again.");
            })
            .finally(() => {
                document.getElementById("send-btn").disabled = false;
            });
        }

        function appendMessage(role, text) {
            const chatWindow = document.getElementById("chat-window");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendAnswer(data) {
            const chatWindow = document.getElementById("chat-window");
            const div = document.createElement("div");
            div.className = "message assistant";

            let sourcesHtml = "";
            if (data.sources && data.sources.length > 0) {
                const items = data.sources.map((s, i) => `
                    <div class="source-item">
                        <strong>${escapeHtml(s.source)}</strong> — ${escapeHtml(s.section_title)}
                        <p class="snippet">${escapeHtml(s.snippet)}</p>
                    </div>
                `).join("");

                sourcesHtml = `
                    <div class="sources">
                        <button class="sources-toggle" onclick="toggleSources(this)">
                            ▶ Sources (${data.sources.length})
                        </button>
                        <div class="sources-list" style="display:none;">
                            ${items}
                        </div>
                    </div>
                `;
            }

            const latency = data.latency_ms ? `<span class="latency">${data.latency_ms}ms</span>` : "";

            div.innerHTML = `
                <div class="message-content">${formatAnswer(data.answer)}</div>
                ${sourcesHtml}
                ${latency}
            `;

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendLoading() {
            const chatWindow = document.getElementById("chat-window");
            const div = document.createElement("div");
            const id = "loading-" + Date.now();
            div.id = id;
            div.className = "message assistant loading";
            div.innerHTML = `<div class="message-content"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function toggleSources(btn) {
            const list = btn.nextElementSibling;
            const isHidden = list.style.display === "none";
            list.style.display = isHidden ? "block" : "none";
            btn.textContent = (isHidden ? "▼" : "▶") + btn.textContent.slice(1);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function formatAnswer(text) {
            return escapeHtml(text).replace(/\n/g, "<br>");
        }
    </script>
</body>
</html>
